<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InterfaceOne - Barra de Mensagem</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --focus: #2563eb;
      --focus-soft: rgba(37, 99, 235, 0.16);
      --send-bg: #111827;
      --send-bg-hover: #000000;
      --send-disabled: #9ca3af;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
      --radius-pill: 9999px;
      --transition: 180ms ease;
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 70%);
      display: flex;
      flex-direction: column;
    }

    .page-content {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    /* Área fixa no rodapé para centralizar a barra de mensagem */
    .composer-shell {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      padding: 12px 14px 20px;
      pointer-events: none;
    }

    /* Container principal com visual minimalista e formato "pill" */
    .composer {
      width: min(var(--max-width), calc(100vw - 28px));
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 10px 10px 10px 18px;
      box-shadow: var(--shadow);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
      pointer-events: auto;
    }

    /* Animação de foco suave ao interagir na barra */
    .composer:focus-within {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px var(--focus-soft), var(--shadow);
      transform: translateY(-1px);
    }

    /* Textarea expansível até 6 linhas */
    .composer-textarea {
      flex: 1;
      border: 0;
      outline: none;
      resize: none;
      overflow-y: auto;
      max-height: calc(1.45em * 6);
      min-height: calc(1.45em * 1);
      line-height: 1.45;
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      padding: 6px 2px 6px 0;
    }

    .composer-textarea::placeholder {
      color: var(--muted);
    }

    /* Botão enviar com ícone e estados de acessibilidade */
    .send-button {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--send-disabled);
      color: #fff;
      cursor: not-allowed;
      transition: background-color var(--transition), transform var(--transition), opacity var(--transition);
      flex-shrink: 0;
    }

    .send-button svg {
      width: 18px;
      height: 18px;
    }

    .send-button:enabled {
      background: var(--send-bg);
      cursor: pointer;
    }

    .send-button:enabled:hover {
      background: var(--send-bg-hover);
      transform: translateY(-1px);
    }

    .send-button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Ajustes responsivos para telas menores */
    @media (max-width: 640px) {
      .composer-shell {
        padding: 10px 10px 14px;
      }

      .composer {
        padding: 9px 9px 9px 14px;
        gap: 8px;
      }

      .composer-textarea {
        font-size: 0.97rem;
      }

      .send-button {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <main class="page-content" aria-hidden="true">
    <p>InterfaceOne • Barra de mensagem inspirada no ChatGPT moderno</p>
  </main>

  <div class="composer-shell">
    <!-- Formulário acessível para envio por Enter e clique no botão -->
    <form class="composer" id="composer" novalidate>
      <label for="messageInput" class="sr-only">Digite sua mensagem</label>
      <textarea
        id="messageInput"
        class="composer-textarea"
        rows="1"
        placeholder="Envie uma mensagem..."
        aria-label="Campo de mensagem"
      ></textarea>

      <button id="sendButton" class="send-button" type="submit" aria-label="Enviar mensagem" disabled>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor" />
        </svg>
      </button>
    </form>
  </div>

  <script>
    // Referências principais da interface
    const form = document.getElementById('composer');
    const textarea = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    // Utilitário para saber se existe texto válido (ignora apenas espaços)
    function hasMessageContent() {
      return textarea.value.trim().length > 0;
    }

    // Ajusta altura automaticamente, limitando a 6 linhas
    function autoResizeTextarea() {
      textarea.style.height = 'auto';
      const computed = window.getComputedStyle(textarea);
      const lineHeight = parseFloat(computed.lineHeight) || 22;
      const maxHeight = lineHeight * 6;
      textarea.style.height = `${Math.min(textarea.scrollHeight, maxHeight)}px`;
      textarea.style.overflowY = textarea.scrollHeight > maxHeight ? 'auto' : 'hidden';
    }

    // Atualiza estado do botão conforme conteúdo
    function updateSendState() {
      sendButton.disabled = !hasMessageContent();
    }

    // Fluxo de envio principal: captura texto, limpa campo e restaura estado
    function submitMessage() {
      if (!hasMessageContent()) return;

      const message = textarea.value.trim();
      console.log('Mensagem enviada:', message);

      // Limpa campo após envio
      textarea.value = '';
      autoResizeTextarea();
      updateSendState();
      textarea.focus();
    }

    // Reage a digitação para auto-expandir e habilitar/desabilitar envio
    textarea.addEventListener('input', () => {
      autoResizeTextarea();
      updateSendState();
    });

    // Enter envia; Shift+Enter quebra linha
    textarea.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        submitMessage();
      }
    });

    // Submissão padrão do formulário (clique no botão ou Enter em alguns contextos)
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      submitMessage();
    });

    // Estado inicial da UI
    autoResizeTextarea();
    updateSendState();
  </script>
</body>
</html>
